<!DOCTYPE html>
<html>
<head>
    <title>Login - DietTracker</title>

    <style>

        /* ----------- BACKGROUND SLIDESHOW ----------- */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;

            background: url("neon1.png") no-repeat center center/cover;
            animation: bgSlide 14s infinite alternate ease-in-out;
        }

        @keyframes bgSlide {
            0%   { background-image: url("neon1.png"); }
            50%  { background-image: url("neon2.png"); }
            100% { background-image: url("neon1.png"); }
        }

        /* ----------- ANIMATED PARTICLES ----------- */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #00ff88;
            border-radius: 50%;
            opacity: 0.7;
            animation: floatUp 6s infinite ease-in-out;
        }

        @keyframes floatUp {
            from { transform: translateY(40px) scale(0.5); opacity: 0.3; }
            to   { transform: translateY(-700px) scale(1); opacity: 1; }
        }

        /* ----------- LOGIN BOX ----------- */
        .login-box {
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid #00ff88;
            box-shadow: 0 0 20px #00ff8880;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            color: #00ff88;
            text-align: center;
            z-index: 10;
            animation: glowIn 1.6s ease-in-out;
        }

        @keyframes glowIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ----------- INPUTS ----------- */
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: black;
            border: 1px solid #00ff88;
            border-radius: 6px;
            color: white;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px #00ff88;
        }

        /* ----------- BUTTON ----------- */
        button {
            width: 100%;
            padding: 10px;
            background: #00ff88;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            color: black;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 12px #00ff88;
        }
    </style>
</head>
<body>

<!-- PARTICLE CONTAINER -->
<div class="particles">
    <script>
        for(let i=0; i<30; i++){
            document.write('<div class="particle" style="left:'+
            Math.random()*100+'%; top:'+(Math.random()*100)+'%; animation-duration:'+
            (4+Math.random()*4)+'s;"></div>');
        }
    </script>
</div>

<!-- LOGIN BOX -->
<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if (user && pass) {
        localStorage.setItem("user", user);
        window.location.href = "diet.html";
    } else {
        alert("Enter valid details");
    }
}
</script>

</body>
</html>
